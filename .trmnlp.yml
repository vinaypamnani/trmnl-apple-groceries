# TRMNLP local dev-server configuration (NOT uploaded to TRMNL).
# {{ env.VARIABLE }} interpolation is available here.
# Docs: https://github.com/usetrmnl/trmnlp
---
# Auto-reload the preview when these change.
watch:
  - .trmnlp.yml
  - src

# Values for the custom fields defined in src/settings.yml.
custom_fields:
  # The view follows the DATA (the `completed:` block below), not this setting —
  # `list_source` only tailors the settings form. The footer always shows a
  # "Data provided by …" footnote naming the detected source.
  list_source: companion
  title_top: Groceries            # Companion only; blank = Reminders list name
  # title_bottom_right: date_and_time | battery | date_time_and_battery | custom | blank
  title_bottom_right: date_time_and_battery
  title_bottom_right_custom: Custom Label
  font_size: large

# Sample webhook data for the local preview (`trmnlp serve`). To switch views,
# comment/uncomment the `completed:` block at the bottom: present → Shortcut view
# (Pending + Completed), absent → Companion view (single to-buy list). The layouts
# normalize item fields (`title`|`n`, `notes`|`o`); the real Shortcut sends short
# `n`/`o` keys to stay under 2 kB, but rendering is identical either way.
variables:
  trmnl:
    plugin_settings:
      instance_name: Apple Groceries
    user:
      name: Vinay Pamnani
      locale: en
      # On a real device TRMNL fills these from your account timezone (DST-aware).
      # The preview defaults to 0 (UTC); set a real offset here to test local time.
      time_zone_iana: America/Denver
      utc_offset: -21600   # MDT (-6h); seconds
  reminders:
    - { title: Gatorade, notes: '', list_name: Grocery List }
    - { title: Chicken thighs, notes: 'boneless, skinless', list_name: Grocery List }
    - { title: Garam masala, notes: '', list_name: Grocery List }
    - { title: Whole milk, notes: '2% if no whole', list_name: Grocery List }
    - { title: Bananas, notes: '', list_name: Grocery List }
    - { title: Sourdough loaf, notes: '', list_name: Grocery List }
    - { title: Baby spinach, notes: '', list_name: Grocery List }
    - { title: Greek yogurt, notes: 'plain, full fat', list_name: Grocery List }
    - { title: Olive oil, notes: '', list_name: Grocery List }
    - { title: Cheddar cheese, notes: '', list_name: Grocery List }
    - { title: Coffee beans, notes: '', list_name: Grocery List }
    - { title: Roma tomatoes, notes: '', list_name: Grocery List }
  # Uncomment to preview the Shortcut view (adds the Completed column). The footnote
  # will then read "Data provided by Apple Shortcuts".
  # completed:
  #   - { title: Eggs }
  #   - { title: Butter }
  #   - { title: Paper towels }
  #   - { title: Orange juice }
