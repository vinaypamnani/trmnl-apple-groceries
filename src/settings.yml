#
# Plugin definition uploaded to TRMNL by `trmnlp push`.
# Note: `trmnlp pull` overwrites this file with the server's copy.
#
---
strategy: webhook
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
polling_url: ''
polling_headers: ''
polling_body: ''
id: 325674
name: Apple Groceries
refresh_interval: 60
custom_fields:
- keyname: about
  name: About This Plugin
  field_type: author_bio
  description: Show your Apple Reminders grocery list on TRMNL. Feed it from the TRMNL Companion iOS app (recommended, no setup) or an Apple Shortcut.
  github_url: https://github.com/vinaypamnani/trmnl-apple-plugin
# TODO: replace `value` with the real iCloud link after sharing the Shortcut
# (Shortcuts app -> Share -> Copy iCloud Link). See docs/apple-shortcut.md.
- keyname: apple_shortcut_url
  field_type: copyable
  name: Apple Shortcut (optional)
  value: "https://www.icloud.com/shortcuts/REPLACE_AFTER_SHARING"
  description: |-
    Optional, for the Apple Shortcut method. Import this Shortcut on your iPhone
    or iPad, then paste this plugin's Webhook URL (below) when it prompts you.
    Tip: add automations so it runs on a schedule and when Reminders closes, so
    your TRMNL stays current. The Companion app doesn't need this.
- keyname: webhook_url
  field_type: copyable_webhook_url
  name: Webhook URL (optional)
  description: >-
    For the Apple Shortcut method, POST your grocery list here as JSON (the
    Companion app doesn't need this). Easiest path: import the Shortcut from the
    "Apple Shortcut" field above and paste this URL when it asks. Building your
    own? Send pending + completed (completed unlocks the Completed column),
    newest-completed first, under 2 kB (~40 pending + 12 completed). Per item:
    n = name (required), o = note, f = flagged. Shape:
    {"pending":[{"n":"Milk","o":"2%","f":true}],"completed":[{"n":"Eggs"}]}
  help_text: This will populate once the plugin has been created/saved.
- keyname: show_flags
  field_type: select
  options:
    - "Yes"
    - "No"
  default: "yes"
  name: Show Flags (optional)
  description: "Show a flag icon for flagged items. Shortcut method only - the Companion app sends no flag data."
- keyname: font_size
  field_type: select
  options:
    - "Regular"
    - "Large"
    - "Extra Large"
  default: large
  name: Font Size
  description: 'Overall text size. Larger sizes are easier to read from a distance but show fewer items before "and N more".'
- keyname: title_lines
  field_type: number
  default: 1
  min: 1
  max: 4
  name: Title Lines
  description: How many maximum lines do you want item names to wrap over?
- keyname: right_label
  field_type: select
  options:
    - "Attribution"
    - "Your Name"
    - "Blank"
  default: attribution
  name: Title-Bar Label
  description: What do you want shown on the right of the title bar?
