#
# Plugin definition uploaded to TRMNL by `trmnlp push`.
# Note: `trmnlp pull` overwrites this file with the server's copy.
#
---
strategy: webhook
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
polling_url: ''
polling_headers: ''
polling_body: ''
id: 325674
name: Apple Groceries
refresh_interval: 60
custom_fields:
- keyname: about
  name: About This Plugin
  field_type: author_bio
  category: life
  description: Show your Apple Reminders grocery list on TRMNL. Feed it from the TRMNL Companion iOS app (recommended, no setup) or an Apple Shortcut (import link & setup in the guide).
  github_url: https://github.com/vinaypamnani/trmnl-apple-groceries
  learn_more_url: https://github.com/vinaypamnani/trmnl-apple-groceries/blob/main/docs/apple-shortcut.md
- keyname: list_source
  field_type: select
  # TRMNL submits the lowercased, underscored option label as the value
  # (e.g. "Companion" -> "companion"); the layouts match on those slugs.
  options:
    - "Companion"
    - "Shortcut"
  default: companion
  name: List Source
  description: Which source you use. This only tailors the fields below — the view itself auto-adapts to the data received (the Shortcut's payload adds the Completed column), and a footnote at the bottom of the screen always notes the detected source ("Data provided by …"). The Companion app needs no setup.
  conditional_validation:
    - when: companion
      hidden:
        - webhook_url
    - when: shortcut
      hidden:
        - title_top
- keyname: webhook_url
  field_type: copyable_webhook_url
  optional: true
  name: Webhook URL (optional)
  description: >-
    Apple Shortcut method only — the Companion app doesn't need this. Import the
    prebuilt Shortcut (https://www.icloud.com/shortcuts/2d812f47d86a4f29a2d4dc5facdbd166),
    then paste this URL when it prompts you. Add automations so it runs on a
    schedule and when Reminders closes, to keep TRMNL current. Payload format and
    a build-your-own guide: https://github.com/vinaypamnani/trmnl-apple-groceries
  help_text: This will populate once the plugin has been created/saved.
- keyname: title_top
  field_type: string
  optional: true
  default: ''
  name: Top Title
  description: Heading at the top of the list — Companion app only. Leave blank to use your Reminders list name. (The Apple Shortcut always shows Pending/Completed; the bottom bar always shows your plugin's name.)
- keyname: title_bottom_right
  field_type: select
  # Values are the slugified labels ("Date and Time" -> "date_and_time"); the
  # layouts' `case` matches on those slugs.
  options:
    - "Date and Time"
    - "Battery"
    - "Date Time and Battery"
    - "Custom"
    - "Blank"
  default: date_time_and_battery
  name: Bottom Bar (Right)
  description: 'What to show on the right of the bottom bar. Date/time uses your device''s local time; "Custom" shows the text you enter below.'
  conditional_validation:
    - when: date_and_time
      hidden: [title_bottom_right_custom]
    - when: battery
      hidden: [title_bottom_right_custom]
    - when: date_time_and_battery
      hidden: [title_bottom_right_custom]
    - when: blank
      hidden: [title_bottom_right_custom]
- keyname: title_bottom_right_custom
  field_type: string
  optional: true
  default: ''
  name: Custom Bottom-Right Text
  description: Shown only when "Bottom Bar (Right)" is set to Custom. Leave blank to hide.
- keyname: font_size
  field_type: select
  options:
    - "Regular"
    - "Large"
    - "Extra Large"
  default: large
  name: Font Size
  description: 'Overall text size. Larger sizes are easier to read from a distance but show fewer items before "and N more".'
